<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }

  /* ── Écran de chargement (masqué dès que React monte) ── */
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    background: #08080F;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  #splash-logo {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg,#6366F1,#8B5CF6);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  #splash-label { color: #9090B8; font-size: 13px; font-family: 'Inter',system-ui,sans-serif; }
  #splash-bar {
    width: 160px; height: 3px; background: #1A1A30; border-radius: 4px; overflow: hidden;
  }
  #splash-fill {
    height: 100%; width: 0%; background: linear-gradient(90deg,#6366F1,#8B5CF6);
    border-radius: 4px;
    animation: splashFill 0.6s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes splashFill { 0%{width:0%} 60%{width:80%} 85%{width:95%} 100%{width:100%} }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #08080F;
    color: #EEEEF8;
  }
  * { font-family: inherit; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2A2A50; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #4A4A80; }

  /* Sidebar */
  .sidebar { transition: width 0.25s cubic-bezier(0.16,1,0.3,1); }
  .sidebar-item { transition: background 0.12s, color 0.12s; border-radius: 8px; }
  .sidebar-item:hover { background: rgba(255,255,255,0.06); }
  .sidebar-item.active { background: rgba(99,102,241,0.18); color: #818CF8; }

  /* View transitions */
  .view-container { animation: viewIn 0.22s cubic-bezier(0.16,1,0.3,1); }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(6px) scale(0.995); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Card hover */
  .app-card {
    transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease !important;
  }
  .app-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.45) !important;
  }

  /* Decision card */
  .decision-card {
    transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
    user-select: none;
  }
  .decision-card:hover { filter: brightness(1.08); }
  .decision-card:active { transform: scale(0.98); }

  /* Decision bandeau */
  .decision-bandeau {
    transition: opacity 0.18s ease, transform 0.18s cubic-bezier(0.16,1,0.3,1);
  }
  .decision-bandeau.entering {
    animation: bandeauIn 0.2s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes bandeauIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Buttons */
  button { transition: opacity 0.1s, transform 0.1s, background 0.12s; }

  /* Modal overlay */
  .modal-overlay {
    animation: overlayIn 0.15s ease;
  }
  @keyframes overlayIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .modal-content {
    animation: modalIn 0.2s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Tooltip */
  .tooltip {
    animation: tooltipIn 0.12s ease;
    pointer-events: none;
  }
  @keyframes tooltipIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Filter pill */
  .filter-pill {
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }

  /* Stagger cards */
  .cards-grid > * {
    animation: cardIn 0.2s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .cards-grid > *:nth-child(1)  { animation-delay: 0.00s; }
  .cards-grid > *:nth-child(2)  { animation-delay: 0.03s; }
  .cards-grid > *:nth-child(3)  { animation-delay: 0.05s; }
  .cards-grid > *:nth-child(4)  { animation-delay: 0.07s; }
  .cards-grid > *:nth-child(5)  { animation-delay: 0.09s; }
  .cards-grid > *:nth-child(n+6){ animation-delay: 0.11s; }

  /* Recharts overrides */
  .recharts-tooltip-wrapper { z-index: 100; }
  .recharts-default-tooltip {
    background: #16162A !important;
    border: 1px solid #2A2A44 !important;
    border-radius: 8px !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 12px !important;
  }
</style>

<style>
  /* ── Design System Tokens ── */
  :root {
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.25), 0 2px 4px rgba(0,0,0,0.15);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.35), 0 4px 8px rgba(0,0,0,0.2);
    --z-base: 0; --z-dropdown: 100; --z-panel: 200; --z-modal: 500; --z-toast: 1000;
    --dur-fast: 120ms; --dur-base: 200ms; --dur-slow: 300ms;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in: cubic-bezier(0.4, 0, 1, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ── Disabled states ── */
  button:disabled { opacity: 0.38 !important; cursor: not-allowed !important; pointer-events: none; }

  /* ── Focus rings ── */
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid #6366F1;
    outline-offset: 2px;
  }

  /* ── Cursor ── */
  button { cursor: pointer; }
  [disabled] { cursor: not-allowed !important; }

  /* ── Skeleton loading ── */
  .skeleton {
    background: linear-gradient(90deg, #1A1A35 25%, #252550 50%, #1A1A35 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius-md);
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .spinner { width:32px;height:32px;border:3px solid #1E1E40;border-top-color:#6366F1;border-radius:50%;animation:spin 0.7s linear infinite; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Touch targets ── */
  .touch-target { min-height: 44px; min-width: 44px; }

  /* ── Recharts theme ── */
  .recharts-tooltip-wrapper .recharts-default-tooltip {
    border-radius: 8px !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 12px !important;
  }
  .recharts-cartesian-axis-tick-value { font-family: 'Inter' !important; font-size: 11px !important; }
  .recharts-legend-item-text { font-family: 'Inter' !important; font-size: 11px !important; }

  /* ── Bento grid ── */
  .bento-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
  }
  .bento-span-3 { grid-column: span 3; }
  .bento-span-4 { grid-column: span 4; }
  .bento-span-6 { grid-column: span 6; }
  .bento-span-8 { grid-column: span 8; }
  .bento-span-12 { grid-column: span 12; }

  /* ── Enhanced view transition ── */
  .view-container { animation: viewIn var(--dur-base) var(--ease-out); }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(8px) scale(0.993); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── App card ── */
  .app-card {
    transition: transform var(--dur-fast) var(--ease-out),
                box-shadow var(--dur-fast) var(--ease-out),
                border-color var(--dur-fast) ease !important;
  }
  .app-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md) !important;
  }
  .app-card:active { transform: scale(0.98); }

  /* ── Decision card ── */
  .decision-card {
    transition: background var(--dur-base) ease,
                border-color var(--dur-base) ease,
                box-shadow var(--dur-base) ease,
                opacity var(--dur-base) ease;
    cursor: pointer;
    user-select: none;
  }
  .decision-card:hover { filter: brightness(1.06); }
  .decision-card:active { transform: scale(0.97); transition-duration: 80ms; }

  /* ── Sidebar ── */
  .sidebar { transition: width var(--dur-base) var(--ease-out); overflow: hidden; }
  .sidebar-item {
    transition: background var(--dur-fast) ease, color var(--dur-fast) ease;
    border-radius: var(--radius-md) !important;
    cursor: pointer;
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.06) !important; }
  .sidebar-item.active { background: rgba(99,102,241,0.16) !important; }

  /* ── Filter pill ── */
  .filter-pill {
    transition: background var(--dur-fast) ease,
                color var(--dur-fast) ease,
                border-color var(--dur-fast) ease;
  }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #252545; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #3A3A6A; }

  /* ── Modal ── */
  .modal-overlay { animation: overlayIn var(--dur-fast) ease; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-content { animation: modalIn var(--dur-base) var(--ease-out); }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Stagger cards ── */
  .cards-grid > * { animation: cardIn var(--dur-slow) var(--ease-out) both; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes panelIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
  .cards-grid > *:nth-child(1)  { animation-delay: 0.00s; }
  .cards-grid > *:nth-child(2)  { animation-delay: 0.03s; }
  .cards-grid > *:nth-child(3)  { animation-delay: 0.05s; }
  .cards-grid > *:nth-child(4)  { animation-delay: 0.07s; }
  .cards-grid > *:nth-child(5)  { animation-delay: 0.09s; }
  .cards-grid > *:nth-child(n+6){ animation-delay: 0.11s; }
</style>

<script>
// Fallback : si React ne monte pas dans 8s, affiche l'erreur
window.__cartoErrors = [];
window.onerror = function(msg, src, line) { window.__cartoErrors.push(msg + ' (L' + line + ')'); };
window.__cartoTimeout = setTimeout(function() {
  var s = document.getElementById('splash');
  var r = document.getElementById('root');
  var globals = ['React','ReactDOM','XLSX','lucide'].filter(function(k){ return typeof window[k] !== 'undefined'; });
  var missing = ['React','ReactDOM','XLSX','lucide'].filter(function(k){ return typeof window[k] === 'undefined'; });
  var msg = 'Globals OK: ' + (globals.join(', ')||'aucun') + '\nManquants: ' + (missing.join(', ')||'aucun') + '\nErreurs: ' + (window.__cartoErrors.join(' | ')||'aucune');
  if (s) { s.querySelector('#splash-label').textContent = msg; s.querySelector('#splash-label').style.whiteSpace = 'pre'; }
}, 8000);
</script>
