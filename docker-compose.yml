version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - cartographe_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/cartographe.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped

  # Décommenter pour passer à PostgreSQL :
  # db:
  #   image: postgres:16-alpine
