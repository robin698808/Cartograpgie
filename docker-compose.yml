  #     POSTGRES_DB: cartographe
  #     POSTGRES_USER: cartographe
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  cartographe_data:
